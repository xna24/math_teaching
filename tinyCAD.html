<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tiny CAD</title>

  <!-- Option 1: use Plotly from CDN -->
  <script src="https://cdn.plot.ly/plotly-3.5.1.min.js" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjs@14.7.0/lib/browser/math.js"></script>
  <!--
  Option 2: use local file instead.
  Download plotly-3.5.1.min.js, put it in the same folder as this file,
  then replace the script above with:

  <script src="plotly-3.5.1.min.js" charset="utf-8"></script>
  -->

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    h2 {
      font-size: 20px;
      margin-top: 0;
    }

    .panel {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 15px;
      padding: 10px;
      box-sizing: border-box;
      resize: vertical;
    }

    #commands {
      height: 150px;
    }

    .coord-box {
      height: 36px;
      margin-bottom: 10px;
    }

    #resultBox {
      height: 90px;
      background: #f0f0f0;
      color: #222;
    }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 15px;
      cursor: pointer;
    }

    #message {
      margin-top: 10px;
      font-family: Consolas, Monaco, "Courier New", monospace;
      white-space: pre-wrap;
    }

    #calcMessage {
      margin-top: 10px;
      font-family: Consolas, Monaco, "Courier New", monospace;
      white-space: pre-wrap;
    }

    .error {
      color: #b00020;
    }

    .ok {
      color: #006400;
    }

    #plot {
      width: 100%;
      height: 650px;
      background: white;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .hint {
      color: #555;
      font-size: 14px;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 10px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
  <h1>Tiny CAD</h1>

  <div class="panel">
    <div class="hint">
      Syntax examples:<br>
      <code>Point (3,4,5) red</code><br>
      <code>Line (0,0,1) to (0,1,0) purple</code><br>
      Lines starting with <code>#</code> are ignored. Inline comments also work.
    </div>

    <textarea id="commands">Point (0,0,0)
Point (1,0,0) blue
Point (0,1,0) blue
Point (0,0,1) blue

Line (0,0,0) to (1,0,0)
Line (0,0,0) to (0,1,0)
Line (0,0,0) to (0,0,1)</textarea>

    <br>
    <button onclick="drawFromText()">Draw / Refresh</button>

    <div id="message"></div>
  </div>

  <div id="plot"></div>

  <div class="panel">
    <h2>Plane cross section calculator</h2>
    Input below coordinates of 3 points on the plane you wish to use

    <label for="pointInput1">Point 1</label>
    <textarea id="pointInput1" class="coord-box">(1,0,0)</textarea>

    <label for="pointInput2">Point 2</label>
    <textarea id="pointInput2" class="coord-box">(0,1,0)</textarea>

    <label for="pointInput3">Point 3</label>
    <textarea id="pointInput3" class="coord-box">(0,0,1)</textarea>

    <button onclick="calculateFromInputs()">Generate</button>

    <div id="calcMessage"></div>

    <label for="resultBox">Plane drawing guide</label>
    <textarea id="resultBox" readonly></textarea>
  </div>

  <script>
    const DEFAULT_COLOUR = "black";

    function stripComment(line) {
      const index = line.indexOf("#");
      if (index === -1) return line.trim();
      return line.slice(0, index).trim();
    }

    function parsePointTuple(text) {
      const match = text.match(/^\(\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*\)$/);

      if (!match) {
        throw new Error(`Invalid coordinate tuple: ${text}`);
      }

      return {
        x: Number(match[1]),
        y: Number(match[2]),
        z: Number(match[3])
      };
    }

    function parseLine(rawLine, lineNumber) {
      const line = stripComment(rawLine);

      if (line === "") {
        return null;
      }

      let pointMatch = line.match(
        /^Point\s+(\(\s*-?\d+(?:\.\d+)?\s*,\s*-?\d+(?:\.\d+)?\s*,\s*-?\d+(?:\.\d+)?\s*\))(?:\s+([A-Za-z][A-Za-z0-9_-]*|#[0-9A-Fa-f]{3,6}))?\s*$/i
      );

      if (pointMatch) {
        const p = parsePointTuple(pointMatch[1]);
        const colour = pointMatch[2] || DEFAULT_COLOUR;

        return {
          type: "point",
          point: p,
          colour: colour,
          label: `(${p.x}, ${p.y}, ${p.z})`
        };
      }

      let lineMatch = line.match(
        /^Line\s+(\(\s*-?\d+(?:\.\d+)?\s*,\s*-?\d+(?:\.\d+)?\s*,\s*-?\d+(?:\.\d+)?\s*\))\s+to\s+(\(\s*-?\d+(?:\.\d+)?\s*,\s*-?\d+(?:\.\d+)?\s*,\s*-?\d+(?:\.\d+)?\s*\))(?:\s+([A-Za-z][A-Za-z0-9_-]*|#[0-9A-Fa-f]{3,6}))?\s*$/i
      );

      if (lineMatch) {
        const p1 = parsePointTuple(lineMatch[1]);
        const p2 = parsePointTuple(lineMatch[2]);
        const colour = lineMatch[3] || DEFAULT_COLOUR;

        return {
          type: "line",
          from: p1,
          to: p2,
          colour: colour
        };
      }

      throw new Error(`Line ${lineNumber}: cannot parse command: ${rawLine}`);
    }

    function buildTraces(objects) {
      const traces = [];

      for (const obj of objects) {
        if (obj.type === "point") {
          traces.push({
            type: "scatter3d",
            mode: "markers+text",
            x: [obj.point.x],
            y: [obj.point.y],
            z: [obj.point.z],
            text: [obj.label],
            textposition: "top center",
            marker: {
              size: 5,
              color: obj.colour
            },
            name: obj.label,
            showlegend: false
          });
        }

        if (obj.type === "line") {
          traces.push({
            type: "scatter3d",
            mode: "lines+markers",
            x: [obj.from.x, obj.to.x],
            y: [obj.from.y, obj.to.y],
            z: [obj.from.z, obj.to.z],
            line: {
              width: 5,
              color: obj.colour
            },
            marker: {
              size: 4,
              color: obj.colour
            },
            name: "Line",
            showlegend: false
          });
        }
      }

      return traces;
    }

    function getBounds(objects) {
      const xs = [];
      const ys = [];
      const zs = [];

      for (const obj of objects) {
        if (obj.type === "point") {
          xs.push(obj.point.x);
          ys.push(obj.point.y);
          zs.push(obj.point.z);
        }

        if (obj.type === "line") {
          xs.push(obj.from.x, obj.to.x);
          ys.push(obj.from.y, obj.to.y);
          zs.push(obj.from.z, obj.to.z);
        }
      }

      if (xs.length === 0) {
        return {
          x: [-1, 1],
          y: [-1, 1],
          z: [-1, 1]
        };
      }

      const all = xs.concat(ys, zs);
      const minVal = Math.min(...all);
      const maxVal = Math.max(...all);

      let pad = 0.5;
      if (maxVal > minVal) {
        pad = 0.15 * (maxVal - minVal);
      }

      return {
        x: [minVal - pad, maxVal + pad],
        y: [minVal - pad, maxVal + pad],
        z: [minVal - pad, maxVal + pad]
      };
    }

    function drawFromText() {
      const text = document.getElementById("commands").value;
      const message = document.getElementById("message");
      const lines = text.split(/\r?\n/);

      const objects = [];
      const errors = [];

      for (let i = 0; i < lines.length; i++) {
        try {
          const obj = parseLine(lines[i], i + 1);
          if (obj !== null) {
            objects.push(obj);
          }
        } catch (err) {
          errors.push(err.message);
        }
      }

      if (errors.length > 0) {
        message.className = "error";
        message.textContent = errors.join("\n");
        return;
      }

      const traces = buildTraces(objects);
      const bounds = getBounds(objects);

      const layout = {
        margin: {
          l: 0,
          r: 0,
          b: 0,
          t: 0
        },
        scene: {
          xaxis: {
            title: "x",
            range: bounds.x,
            zeroline: true
          },
          yaxis: {
            title: "y",
            range: bounds.y,
            zeroline: true
          },
          zaxis: {
            title: "z",
            range: bounds.z,
            zeroline: true
          },
          aspectmode: "cube",
          camera: {
            eye: {
              x: 1.6,
              y: 1.6,
              z: 1.2
            }
          }
        }
      };

      const config = {
        responsive: true,
        scrollZoom: true,
        displaylogo: false
      };

      Plotly.react("plot", traces, layout, config);

      message.className = "ok";
      message.textContent = `Drawn successfully: ${objects.length} object(s).`;
    }

    /*
      This is the function for you to edit later.

      It receives:
      x1, y1, z1 from the first point
      x2, y2, z2 from the second point
      x3, y3, z3 from the third point

      For now, it returns just x1 and y2.
    */
    
    function rank3x3(A, tolerance = 1e-10) {
      /*
        A should be a 3 by 3 array, for example:
    
        const A = [
          [x1, y1, z1],
          [x2, y2, z2],
          [x3, y3, z3]
        ];
      */
    
      // Rank 3 iff the 3 by 3 determinant is non-zero
      if (Math.abs(math.det(A)) > tolerance) {
        return 3;
      }
    
      // All possible 2 by 2 minors
      const minors = [
        [[A[0][0], A[0][1]], [A[1][0], A[1][1]]],
        [[A[0][0], A[0][2]], [A[1][0], A[1][2]]],
        [[A[0][1], A[0][2]], [A[1][1], A[1][2]]],
    
        [[A[0][0], A[0][1]], [A[2][0], A[2][1]]],
        [[A[0][0], A[0][2]], [A[2][0], A[2][2]]],
        [[A[0][1], A[0][2]], [A[2][1], A[2][2]]],
    
        [[A[1][0], A[1][1]], [A[2][0], A[2][1]]],
        [[A[1][0], A[1][2]], [A[2][0], A[2][2]]],
        [[A[1][1], A[1][2]], [A[2][1], A[2][2]]]
      ];
    
      // Rank at least 2 iff at least one 2 by 2 minor is non-zero
      for (const M of minors) {
        if (Math.abs(math.det(M)) > tolerance) {
          return 2;
        }
      }
    
      // Rank at least 1 iff at least one entry is non-zero
      for (const row of A) {
        for (const entry of row) {
          if (Math.abs(entry) > tolerance) {
            return 1;
          }
        }
      }
    
      return 0;
    }
    
    function normal_rank2_case(
      x1, y1, z1,
      x2, y2, z2,
      x3, y3, z3,
      tolerance = 1e-10
    ) {
      const v1 = [x1, y1, z1];
      const v2 = [x2, y2, z2];
      const v3 = [x3, y3, z3];
    
      const candidates = [
        math.cross(v1, v2),
        math.cross(v1, v3),
        math.cross(v2, v3)
      ];
    
      for (const n of candidates) {
        if (math.norm(n) > tolerance) {return n;}
      }
    
      throw new Error("Could not find a non-zero cross product. The input vectors may have rank less than 2.");
    }
    
    function normal_rank3_case(
      x1, y1, z1,
      x2, y2, z2,
      x3, y3, z3
    ) {
      const A = [
        [x1, y1, z1],
        [x2, y2, z2],
        [x3, y3, z3]
      ];
    
      const b = [1, 1, 1];
    
      const solution = math.lusolve(A, b);
    
      const normal_A = solution[0][0];
      const normal_B = solution[1][0];
      const normal_C = solution[2][0];
    
      return [normal_A, normal_B, normal_C];
    }
    
    function plane_normal(x1, y1, z1, x2, y2, z2, x3, y3, z3) {
      const A = [
        [x1, y1, z1],
        [x2, y2, z2],
        [x3, y3, z3]
      ];
    
      const rank = rank3x3(A);
      
      if (rank <= 1) {
        throw "They do not determine a plane.";
      } else if (rank == 2) {
        const normal = normal_rank2_case(
          x1, y1, z1,
          x2, y2, z2,
          x3, y3, z3
        );
        
        return normal.concat([0]);
      
      } else if (rank == 3){
        const normal = normal_rank3_case(
          x1, y1, z1,
          x2, y2, z2,
          x3, y3, z3
        );
        
        return normal.concat([1]);
      }
    }
    


    function calculateFromInputs() {
      const calcMessage = document.getElementById("calcMessage");
      const resultBox = document.getElementById("resultBox");

      try {
        const p1 = parsePointTuple(document.getElementById("pointInput1").value.trim());
        const p2 = parsePointTuple(document.getElementById("pointInput2").value.trim());
        const p3 = parsePointTuple(document.getElementById("pointInput3").value.trim());

        const x1 = p1.x;
        const y1 = p1.y;
        const z1 = p1.z;

        const x2 = p2.x;
        const y2 = p2.y;
        const z2 = p2.z;

        const x3 = p3.x;
        const y3 = p3.y;
        const z3 = p3.z;

        const answer = plane_normal(
          x1, y1, z1,
          x2, y2, z2,
          x3, y3, z3
        );

        resultBox.value = `answer = ${answer.join(", ")}`;

        calcMessage.className = "ok";
        calcMessage.textContent = "Calculation successful.";
      } catch (err) {
        calcMessage.className = "error";
        calcMessage.textContent = String(err);
        resultBox.value = "";
      }
    }

    drawFromText();
  </script>
</body>
</html>
