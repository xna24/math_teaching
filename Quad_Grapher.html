<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quadratic Graph Explorer</title>

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      line-height: 1.35;
      color: #222;
      overflow: hidden;
    }

    .app-layout {
      height: 100vh;
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(360px, 0.75fr) minmax(540px, 1.35fr);
      gap: 14px;
    }

    .plot-column {
      order: 2;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #plot {
      width: 100%;
      flex: 1 1 auto;
      min-height: 300px;
      border: 1px solid #aaa;
    }

    .right-column {
      order: 1;
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 24px;
    }

    .intro {
      max-width: 720px;
      margin-bottom: 10px;
      font-size: 15px;
      line-height: 1.3;
    }

    .intro mjx-container {
      font-size: 90% !important;
    }

    .form-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .form-selector label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .equation-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .equation-row mjx-container {
      font-size: 85% !important;
    }

    .equation-row input {
      width: 64px;
      font-size: 17px;
      padding: 4px 6px;
      text-align: center;
    }

    button {
      font-size: 15px;
      padding: 7px 14px;
      cursor: pointer;
    }

    #drawBtn {
      margin-bottom: 8px;
    }

    #message {
      min-height: 22px;
      font-weight: bold;
      color: darkred;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .feature-panel {
      border: 1px solid #bbb;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fafafa;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .feature-panel h2 {
      font-size: 17px;
      margin: 0 0 8px 0;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
    }

    .feature-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .feature-item {
      display: grid;
      grid-template-columns: 20px 1fr;
      column-gap: 6px;
      align-items: center;
      margin: 0;
    }

    .feature-item input {
      margin: 0;
    }

    .feature-name {
      font-weight: bold;
    }

    .freeze-controls {
      display: none;
      margin-top: 0;
      margin-bottom: 8px;
      padding: 10px 12px;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: #fafafa;
    }

    .freeze-controls.active {
      display: block;
    }

    .freeze-controls h2 {
      font-size: 16px;
      margin: 0 0 8px 0;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 26px 1fr 72px;
      gap: 8px;
      align-items: center;
      margin: 6px 0;
      font-size: 14px;
    }

    .slider-row input[type="range"] {
      width: 100%;
    }

    .slider-value {
      font-family: Consolas, "Courier New", monospace;
      text-align: right;
    }

    #freezeBtn {
      margin-top: 2px;
    }

    .view-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app-layout {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      #plot {
        height: 420px;
        flex: none;
      }

      .right-column {
        overflow: visible;
      }
    }

  </style>
</head>

<body>

  <div class="app-layout">
    <div class="plot-column">
      <div id="plot"></div>
    </div>

    <div class="right-column">
      <h1>Quadratic Graph Explorer</h1>

      <div class="form-selector">
        <label><input type="radio" name="formMode" value="standard" checked /> Standard form</label>
        <label><input type="radio" name="formMode" value="vertex" /> Vertex form</label>
        <label><input type="radio" name="formMode" value="factored" /> Factored form</label>
      </div>

      <div id="introText" class="intro"></div>

      <div id="equationRow" class="equation-row">
        <span id="eqPart0"></span>
        <input id="aInput" type="text" inputmode="decimal" value="1" />
        <span id="eqPart1"></span>
        <input id="bInput" type="text" inputmode="decimal" value="-4" />
        <span id="eqPart2"></span>
        <input id="cInput" type="text" inputmode="decimal" value="1" />
        <span id="eqPart3"></span>
      </div>

      <button id="drawBtn">Draw / Update</button>

      <div id="message"></div>

      <div class="feature-panel">
        <h2>Show / Hide Features</h2>

        <div class="features-grid">
          <div class="feature-col">
            <label class="feature-item">
              <input id="axesToggle" type="checkbox" checked />
              <span class="feature-name">axes</span>
            </label>

            <label class="feature-item">
              <input id="symmetryToggle" type="checkbox" checked />
              <span class="feature-name">axis of symmetry</span>
            </label>

            <label class="feature-item">
              <input id="vertexToggle" type="checkbox" checked />
              <span class="feature-name">vertex</span>
            </label>
          </div>

          <div class="feature-col">
            <label class="feature-item">
              <input id="rootsToggle" type="checkbox" checked />
              <span class="feature-name">x-intercept(s)</span>
            </label>

            <label class="feature-item">
              <input id="yInterceptToggle" type="checkbox" checked />
              <span class="feature-name">y-intercept</span>
            </label>
          </div>
        </div>
      </div>

      <div id="sliderControls" class="freeze-controls">
        <h2>Frozen coefficient controls</h2>

        <div class="slider-row">
          <label id="slider1Label" for="aSlider">\(a\)</label>
          <input id="aSlider" type="range" />
          <span id="aSliderValue" class="slider-value">1.000</span>
        </div>

        <div class="slider-row">
          <label id="slider2Label" for="bSlider">\(b\)</label>
          <input id="bSlider" type="range" />
          <span id="bSliderValue" class="slider-value">-4.000</span>
        </div>

        <div class="slider-row">
          <label id="slider3Label" for="cSlider">\(c\)</label>
          <input id="cSlider" type="range" />
          <span id="cSliderValue" class="slider-value">1.000</span>
        </div>
      </div>

      <div class="view-buttons">
        <button id="freezeBtn">Freeze</button>
        <button id="zoomInBtn">Zoom In</button>
        <button id="zoomOutBtn">Zoom Out</button>
      </div>
    </div>
  </div>

  <script>
    const EPS = 1e-12;

    const FORM_CONFIG = {
      standard: {
        names: ["a", "b", "c"],
        defaults: [1, -4, 1],
        intro: "Enter numerical values for the coefficients for quadratic function \\(y=ax^2+bx+c\\), with \\(a\\neq 0\\).",
        parts: ["\\(y=\\)", "\\(x^2 + (\\)", "\\()x + (\\)", "\\()\\)"]
      },
      vertex: {
        names: ["a", "h", "k"],
        defaults: [1, 2, -3],
        intro: "Enter numerical values for the pronumerals for quadratic function \\(y=a(x-h)^2+k\\), with \\(a\\neq 0\\).",
        parts: ["\\(y=\\)", "\\((x - \\)", "\\()^2 + (\\)", "\\()\\)"]
      },
      factored: {
        names: ["a", "p", "q"],
        defaults: [1, 1, 3],
        intro: "Enter numerical values for the pronumerals for quadratic function \\(y=a(x-p)(x-q)\\), with \\(a\\neq 0\\).",
        parts: ["\\(y=\\)", "\\((x - \\)", "\\()(x - \\)", "\\()\\)"]
      }
    };

    let isFrozen = false;
    let frozenBounds = null;

    function showError(msg) {
      document.getElementById("message").textContent = msg;
    }

    function clearError() {
      document.getElementById("message").textContent = "";
    }

    function currentForm() {
      return document.querySelector('input[name="formMode"]:checked').value;
    }

    function currentFormConfig() {
      return FORM_CONFIG[currentForm()];
    }

    function typesetElement(element) {
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([element]);
      }
    }

    function setMathHTML(id, html) {
      const element = document.getElementById(id);
      element.innerHTML = html;
      typesetElement(element);
    }

    function updateFormDisplay(options = {}) {
      const fillDefaults = options.fillDefaults || false;
      const config = currentFormConfig();

      setMathHTML("introText", config.intro);
      setMathHTML("eqPart0", config.parts[0]);
      setMathHTML("eqPart1", config.parts[1]);
      setMathHTML("eqPart2", config.parts[2]);
      setMathHTML("eqPart3", config.parts[3]);

      if (fillDefaults) {
        document.getElementById("aInput").value = config.defaults[0];
        document.getElementById("bInput").value = config.defaults[1];
        document.getElementById("cInput").value = config.defaults[2];
      }

      updateSliderLabels();
    }

    function updateSliderLabels() {
      const names = currentFormConfig().names;
      setMathHTML("slider1Label", `\\(${names[0]}\\)`);
      setMathHTML("slider2Label", `\\(${names[1]}\\)`);
      setMathHTML("slider3Label", `\\(${names[2]}\\)`);
    }

    function parseCoefficient(value, name) {
      const trimmed = value.trim();

      if (trimmed === "") {
        throw new Error(`Please enter a value for ${name}.`);
      }

      const numberPattern = /^[+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?$/;

      if (!numberPattern.test(trimmed)) {
        throw new Error(
          `The value ${name} must be a number, such as 3, -5.26, or 1.4E-5.`
        );
      }

      const num = Number(trimmed);

      if (!Number.isFinite(num)) {
        throw new Error(`The value ${name} is too large or too small to use.`);
      }

      return num;
    }

    function getVertex(a, b, c) {
      const h = -b / (2 * a);
      const k = a * h * h + b * h + c;
      return { h, k };
    }

    function f(a, b, c, x) {
      return a * x * x + b * x + c;
    }

    function three(num) {
      if (!Number.isFinite(num)) return "undefined";
      if (Math.abs(num) < 0.0005) return "0.000";
      return num.toFixed(3);
    }

    function formatNumber(num) {
      if (Math.abs(num) < 1e-12) return "0";

      if (Math.abs(num) >= 1e6 || Math.abs(num) < 1e-4) {
        return num.toExponential(4);
      }

      return Number(num.toFixed(6)).toString();
    }

    function parametersToCoefficients(form, params) {
      const A = params[0];
      const u = params[1];
      const v = params[2];

      if (form === "standard") {
        return { a: A, b: u, c: v };
      }

      if (form === "vertex") {
        const h = u;
        const k = v;
        return {
          a: A,
          b: -2 * A * h,
          c: A * h * h + k
        };
      }

      // factored form: y = a(x-p)(x-q) = ax^2 - a(p+q)x + apq
      const p = u;
      const q = v;
      return {
        a: A,
        b: -A * (p + q),
        c: A * p * q
      };
    }

    function getCurrentModel(options = {}) {
      const allowAZero = options.allowAZero || false;
      const form = currentForm();
      const config = currentFormConfig();

      const params = [
        parseCoefficient(document.getElementById("aInput").value, config.names[0]),
        parseCoefficient(document.getElementById("bInput").value, config.names[1]),
        parseCoefficient(document.getElementById("cInput").value, config.names[2])
      ];

      if (!allowAZero && Math.abs(params[0]) < EPS) {
        throw new Error("This is not a quadratic. Please make sure a ≠ 0.");
      }

      const coeffs = parametersToCoefficients(form, params);
      return { form, params, ...coeffs };
    }

    function getCurrentView() {
      const plot = document.getElementById("plot");

      const xRange =
        plot.layout && plot.layout.xaxis && Array.isArray(plot.layout.xaxis.range)
          ? plot.layout.xaxis.range.slice()
          : plot._fullLayout && plot._fullLayout.xaxis && Array.isArray(plot._fullLayout.xaxis.range)
            ? plot._fullLayout.xaxis.range.slice()
            : null;

      const yRange =
        plot.layout && plot.layout.yaxis && Array.isArray(plot.layout.yaxis.range)
          ? plot.layout.yaxis.range.slice()
          : plot._fullLayout && plot._fullLayout.yaxis && Array.isArray(plot._fullLayout.yaxis.range)
            ? plot._fullLayout.yaxis.range.slice()
            : null;

      if (!xRange || !yRange) {
        return null;
      }

      return { xRange, yRange };
    }

    function checkboxIsOn(id) {
      return document.getElementById(id).checked;
    }

    function getRoots(a, b, c) {
      if (Math.abs(a) < EPS) {
        if (Math.abs(b) < EPS) return [];
        return [-c / b];
      }

      const discriminant = b * b - 4 * a * c;

      if (discriminant < -1e-12) {
        return [];
      }

      if (Math.abs(discriminant) <= 1e-12) {
        return [-b / (2 * a)];
      }

      const sqrtD = Math.sqrt(discriminant);
      const r1 = (-b - sqrtD) / (2 * a);
      const r2 = (-b + sqrtD) / (2 * a);

      return [Math.min(r1, r2), Math.max(r1, r2)];
    }

    function updateFeaturePanel(a, b, c, data) {
      // Feature values are no longer shown in the side panel.
    }

    function makeMathData(a, b, c) {
      const roots = getRoots(a, b, c);

      if (Math.abs(a) < EPS) {
        return { roots };
      }

      const { h, k } = getVertex(a, b, c);
      return { h, k, roots };
    }

    function computeAutomaticView(a, b, c, data) {
      const absA = Math.abs(a);
      const h = data.h;
      const k = data.k;

      const xViewMin = h - 1 / absA;
      const xViewMax = h + 1 / absA;

      let yViewMin;
      let yViewMax;

      if (a > 0) {
        yViewMin = k - 0.25 / absA;
        yViewMax = k + 1 / absA;
      } else {
        yViewMin = k - 1 / absA;
        yViewMax = k + 0.25 / absA;
      }

      return {
        xRange: [xViewMin, xViewMax],
        yRange: [yViewMin, yViewMax]
      };
    }

    function makeXValuesFromView(xRange) {
      let left;
      let right;

      if (xRange && xRange.length === 2 && Number.isFinite(xRange[0]) && Number.isFinite(xRange[1])) {
        left = Math.min(xRange[0], xRange[1]);
        right = Math.max(xRange[0], xRange[1]);
      } else {
        left = -10;
        right = 10;
      }

      let span = right - left;

      if (!Number.isFinite(span) || span < EPS) {
        span = 1;
        const centre = Number.isFinite(left) ? left : 0;
        left = centre - 0.5;
        right = centre + 0.5;
      }

      const xPlotMin = left - span;
      const xPlotMax = right + span;

      const numberOfPoints = 1200;
      const step = (xPlotMax - xPlotMin) / numberOfPoints;

      const xValues = [];
      for (let i = 0; i <= numberOfPoints; i++) {
        xValues.push(xPlotMin + i * step);
      }

      return xValues;
    }

    function addFeatureTracesAndShapes(traces, shapes, annotations, a, b, c, data) {
      const roots = data.roots;
      const hasQuadraticFeatures = Math.abs(a) >= EPS;

      if (checkboxIsOn("axesToggle")) {
        shapes.push(
          {
            type: "line",
            xref: "paper",
            yref: "y",
            x0: 0,
            x1: 1,
            y0: 0,
            y1: 0,
            line: { color: "black", width: 4 }
          },
          {
            type: "line",
            xref: "x",
            yref: "paper",
            x0: 0,
            x1: 0,
            y0: 0,
            y1: 1,
            line: { color: "black", width: 4 }
          }
        );
      }

      if (checkboxIsOn("symmetryToggle") && hasQuadraticFeatures) {
        shapes.push({
          type: "line",
          xref: "x",
          yref: "paper",
          x0: data.h,
          x1: data.h,
          y0: 0,
          y1: 1,
          line: { color: "blue", width: 4, dash: "dot" }
        });
      }

      if (checkboxIsOn("vertexToggle") && hasQuadraticFeatures) {
        traces.push({
          x: [data.h],
          y: [data.k],
          mode: "markers",
          name: "Vertex",
          marker: { size: 14, color: "red" }
        });
      }

      if (checkboxIsOn("rootsToggle") && roots.length > 0) {
        traces.push({
          x: roots,
          y: roots.map(() => 0),
          mode: "markers",
          name: "x-intercept(s)",
          marker: { size: 11, color: "green" }
        });
      }

      if (checkboxIsOn("yInterceptToggle")) {
        traces.push({
          x: [0],
          y: [c],
          mode: "markers",
          name: "y-intercept",
          marker: { size: 11, color: "purple" }
        });
      }
    }

    function drawGraph(options = {}) {
      const allowAZero = options.allowAZero || false;
      const preserveView = options.preserveView || false;
      clearError();

      let model;

      try {
        model = getCurrentModel({ allowAZero });
      } catch (err) {
        showError(err.message);
        return;
      }

      const { a, b, c } = model;
      const data = makeMathData(a, b, c);
      updateFeaturePanel(a, b, c, data);

      if (allowAZero && Math.abs(model.params[0]) < EPS) {
        showError("a is currently 0, so this is not a quadratic. The graph is kept using the current expression for now.");
      }

      let finalXRange;
      let finalYRange;

      if (preserveView && options.xRange && options.yRange) {
        finalXRange = options.xRange;
        finalYRange = options.yRange;
      } else if (Math.abs(a) >= EPS) {
        const autoView = computeAutomaticView(a, b, c, data);
        finalXRange = autoView.xRange;
        finalYRange = autoView.yRange;
      } else {
        finalXRange = [-10, 10];
        finalYRange = [-10, 10];
      }

      const xValues = makeXValuesFromView(finalXRange);
      const yValues = xValues.map(x => f(a, b, c, x));

      const traces = [
        {
          x: xValues,
          y: yValues,
          mode: "lines",
          name: "Graph",
          line: { width: 3 }
        }
      ];

      const shapes = [];
      const annotations = [];

      addFeatureTracesAndShapes(traces, shapes, annotations, a, b, c, data);

      const layout = {
        uirevision: isFrozen ? "frozen-view" : "unfrozen-view",
        dragmode: "pan",

        xaxis: {
          title: "x",
          range: finalXRange,
          showgrid: true,
          zeroline: false,
          showline: true,
          mirror: "ticks",
          ticks: "outside",
          linewidth: 2,
          linecolor: "black",
          tickfont: { size: 14 }
        },

        yaxis: {
          title: "y",
          range: finalYRange,
          showgrid: true,
          zeroline: false,
          showline: true,
          mirror: "ticks",
          ticks: "outside",
          linewidth: 2,
          linecolor: "black",
          tickfont: { size: 14 },
          scaleanchor: "x",
          scaleratio: 1
        },

        shapes: shapes,
        annotations: annotations,

        margin: {
          l: 70,
          r: 40,
          t: 20,
          b: 65
        },

        showlegend: false
      };

      const config = {
        responsive: true,
        displayModeBar: true,
        scrollZoom: false
      };

      Plotly.react("plot", traces, layout, config);
    }

    function updateFeaturesOnly() {
      const currentView = getCurrentView();

      drawGraph({
        preserveView: true,
        xRange: currentView ? currentView.xRange : null,
        yRange: currentView ? currentView.yRange : null,
        allowAZero: isFrozen
      });
    }

    function zoomGraph(scaleFactor) {
      const currentView = getCurrentView();
      if (!currentView) return;

      const xMin = currentView.xRange[0];
      const xMax = currentView.xRange[1];
      const yMin = currentView.yRange[0];
      const yMax = currentView.yRange[1];

      const xMid = (xMin + xMax) / 2;
      const yMid = (yMin + yMax) / 2;
      const newXHalfWidth = ((xMax - xMin) * scaleFactor) / 2;
      const newYHalfWidth = ((yMax - yMin) * scaleFactor) / 2;

      drawGraph({
        preserveView: true,
        xRange: [xMid - newXHalfWidth, xMid + newXHalfWidth],
        yRange: [yMid - newYHalfWidth, yMid + newYHalfWidth],
        allowAZero: isFrozen
      });
    }

    function coefficientRangeFromInitial(value) {
      const radius = 5 * Math.abs(value);
      return { min: -radius, max: radius };
    }

    function sliderStep(min, max) {
      const span = Math.abs(max - min);
      if (span < EPS) return 0.001;
      return span / 1000;
    }

    function setupOneSlider(sliderId, valueId, inputId, min, max, value) {
      const slider = document.getElementById(sliderId);
      const valueLabel = document.getElementById(valueId);

      slider.min = min;
      slider.max = max;
      slider.step = sliderStep(min, max);
      slider.value = value;
      valueLabel.textContent = three(value);
      document.getElementById(inputId).value = three(value);
    }

    function syncSlidersFromInputs() {
      if (!isFrozen) return;

      const config = currentFormConfig();
      const p0 = parseCoefficient(document.getElementById("aInput").value, config.names[0]);
      const p1 = parseCoefficient(document.getElementById("bInput").value, config.names[1]);
      const p2 = parseCoefficient(document.getElementById("cInput").value, config.names[2]);

      document.getElementById("aSlider").value = p0;
      document.getElementById("bSlider").value = p1;
      document.getElementById("cSlider").value = p2;

      document.getElementById("aSliderValue").textContent = three(p0);
      document.getElementById("bSliderValue").textContent = three(p1);
      document.getElementById("cSliderValue").textContent = three(p2);
    }

    function enterFrozenState() {
      let model;

      try {
        model = getCurrentModel({ allowAZero: false });
      } catch (err) {
        showError(err.message);
        return;
      }

      isFrozen = true;

      frozenBounds = {
        p0: coefficientRangeFromInitial(model.params[0]),
        p1: coefficientRangeFromInitial(model.params[1]),
        p2: coefficientRangeFromInitial(model.params[2])
      };

      setupOneSlider("aSlider", "aSliderValue", "aInput", frozenBounds.p0.min, frozenBounds.p0.max, model.params[0]);
      setupOneSlider("bSlider", "bSliderValue", "bInput", frozenBounds.p1.min, frozenBounds.p1.max, model.params[1]);
      setupOneSlider("cSlider", "cSliderValue", "cInput", frozenBounds.p2.min, frozenBounds.p2.max, model.params[2]);
      updateSliderLabels();

      document.getElementById("sliderControls").classList.add("active");
      document.getElementById("freezeBtn").textContent = "Unfreeze";

      const currentView = getCurrentView();
      drawGraph({
        preserveView: true,
        xRange: currentView ? currentView.xRange : null,
        yRange: currentView ? currentView.yRange : null,
        allowAZero: true
      });
    }

    function leaveFrozenState() {
      isFrozen = false;
      frozenBounds = null;

      document.getElementById("sliderControls").classList.remove("active");
      document.getElementById("freezeBtn").textContent = "Freeze";

      try {
        getCurrentModel({ allowAZero: false });
        clearError();
      } catch (err) {
        showError(err.message);
      }

      // Intentionally no redraw here: keep the graph, features, and current view exactly as they are.
    }

    function toggleFreeze() {
      if (isFrozen) {
        leaveFrozenState();
      } else {
        enterFrozenState();
      }
    }

    function sliderChanged() {
      if (!isFrozen) return;

      const currentView = getCurrentView();

      const p0 = Number(document.getElementById("aSlider").value);
      const p1 = Number(document.getElementById("bSlider").value);
      const p2 = Number(document.getElementById("cSlider").value);

      document.getElementById("aInput").value = three(p0);
      document.getElementById("bInput").value = three(p1);
      document.getElementById("cInput").value = three(p2);

      document.getElementById("aSliderValue").textContent = three(p0);
      document.getElementById("bSliderValue").textContent = three(p1);
      document.getElementById("cSliderValue").textContent = three(p2);

      drawGraph({
        preserveView: true,
        xRange: currentView ? currentView.xRange : null,
        yRange: currentView ? currentView.yRange : null,
        allowAZero: true
      });
    }

    function formChanged() {
      if (isFrozen) {
        leaveFrozenState();
      }

      updateFormDisplay({ fillDefaults: true });
      drawGraph({ preserveView: false, allowAZero: false });
    }

    document.getElementById("drawBtn").addEventListener("click", function () {
      if (isFrozen) {
        const currentView = getCurrentView();
        syncSlidersFromInputs();
        drawGraph({
          preserveView: true,
          xRange: currentView ? currentView.xRange : null,
          yRange: currentView ? currentView.yRange : null,
          allowAZero: true
        });
      } else {
        drawGraph({ preserveView: false, allowAZero: false });
      }
    });

    document.getElementById("freezeBtn").addEventListener("click", toggleFreeze);
    document.getElementById("zoomInBtn").addEventListener("click", function () {
      zoomGraph(0.7);
    });
    document.getElementById("zoomOutBtn").addEventListener("click", function () {
      zoomGraph(1.4);
    });

    document.querySelectorAll('input[name="formMode"]').forEach(radio => {
      radio.addEventListener("change", formChanged);
    });

    ["aSlider", "bSlider", "cSlider"].forEach(id => {
      document.getElementById(id).addEventListener("input", sliderChanged);
    });

    [
      "axesToggle",
      "symmetryToggle",
      "vertexToggle",
      "rootsToggle",
      "yInterceptToggle"
    ].forEach(id => {
      document.getElementById(id).addEventListener("change", updateFeaturesOnly);
    });

    window.addEventListener("resize", function () {
      const plot = document.getElementById("plot");
      if (plot && plot.data) {
        Plotly.Plots.resize(plot);
      }
    });

    updateFormDisplay({ fillDefaults: false });
    drawGraph({ preserveView: false, allowAZero: false });
  </script>
</body>
</html>
