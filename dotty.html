<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dotty Paper</title>
  <style>
    :root {
      --boundary: #d32f2f;
      --interior: #1565c0;
      --line: #1565c0;
      --preview: #777;
      --bg: #f7f7f7;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #222;
    }

    header {
      padding: 14px 18px 8px;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(500px, 1fr) 290px;
      gap: 12px;
      padding: 12px;
      box-sizing: border-box;
      height: calc(100vh - 78px);
    }

    .canvas-wrap {
      position: relative;
      border: 1px solid #bbb;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
      min-height: 450px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .panel {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 14px;
      background: #fafafa;
      overflow: auto;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .modeBox {
      margin: 6px 0 12px;
      padding: 10px;
      background: white;
      border: 1px solid #e1e1e1;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1.6;
    }

    .modeBox label {
      display: block;
      cursor: pointer;
    }

    .result {
      font-size: 18px;
      margin: 10px 0;
      padding: 10px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e1e1e1;
    }

    .boundary { color: var(--boundary); font-weight: bold; }
    .interior { color: var(--interior); font-weight: bold; }

    button {
      width: 100%;
      font-size: 15px;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    button:hover:not(:disabled) { background: #f0f0f0; }

    button:disabled {
      color: #888;
      background: #e6e6e6;
      border-color: #ccc;
      cursor: not-allowed;
      opacity: 0.55;
    }

    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      font-size: 14px;
      line-height: 1.35;
      min-height: 2.7em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dotty Paper</h1>
  </header>

  <main class="layout">
    <div class="canvas-wrap">
      <canvas id="board"></canvas>
    </div>

    <aside class="panel">
      <h2>Mode</h2>
      <div class="modeBox">
        <label><input type="radio" name="mode" value="add" checked> Add new polygon</label>
        <label><input type="radio" name="mode" value="delete"> Delete polygon</label>
      </div>

      <h2>Count</h2>
      <div class="result"><span class="boundary">p:</span> <span id="pValue">—</span></div>
      <div class="result"><span class="interior">i:</span> <span id="iValue">—</span></div>
      <button id="clearBtn" disabled>Clear</button>

      <div class="message" id="message"></div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');

    const pValue = document.getElementById('pValue');
    const iValue = document.getElementById('iValue');
    const message = document.getElementById('message');
    const clearBtn = document.getElementById('clearBtn');
    const modeInputs = document.querySelectorAll('input[name="mode"]');

    const gridSize = 32;        // pixels per lattice step
    const dotRadius = 3;
    const snapDistance = 14;    // pixels

    let width = 0;
    let height = 0;
    let origin = { x: 0, y: 0 };
    let currentVertices = [];
    let hoverPoint = null;
    let polygons = [];
    let selectedPolygonId = null;
    let hoveredPolygonId = null;
    let nextPolygonId = 1;

    function currentMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      width = Math.floor(rect.width);
      height = Math.floor(rect.height);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      origin = { x: Math.floor(width / 2), y: Math.floor(height / 2) };
      draw();
    }

    function latticeToScreen(pt) {
      return {
        x: origin.x + pt.x * gridSize,
        y: origin.y - pt.y * gridSize
      };
    }

    function screenToLattice(x, y) {
      return {
        x: Math.round((x - origin.x) / gridSize),
        y: Math.round((origin.y - y) / gridSize)
      };
    }

    function mousePos(evt) {
      const rect = canvas.getBoundingClientRect();
      return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
    }

    function samePoint(a, b) {
      return a && b && a.x === b.x && a.y === b.y;
    }

    function pointKey(p) {
      return `${p.x},${p.y}`;
    }

    function gcd(a, b) {
      a = Math.abs(a); b = Math.abs(b);
      while (b !== 0) [a, b] = [b, a % b];
      return a;
    }

    function makePointSet(points) {
      return new Set(points.map(pointKey));
    }

    function allUsedPointSet() {
      const used = new Set();
      for (const poly of polygons) {
        for (const p of poly.boundaryPoints) used.add(pointKey(p));
        for (const p of poly.interiorPoints) used.add(pointKey(p));
      }
      return used;
    }

    function polygonAtLatticePoint(pt) {
      if (!pt) return null;
      const key = pointKey(pt);
      for (let i = polygons.length - 1; i >= 0; i--) {
        const poly = polygons[i];
        if (poly.allPointSet.has(key)) return poly;
      }
      return null;
    }

    function updateHover(evt) {
      const m = mousePos(evt);
      const candidate = screenToLattice(m.x, m.y);
      const s = latticeToScreen(candidate);
      const dist = Math.hypot(m.x - s.x, m.y - s.y);
      hoverPoint = dist <= snapDistance ? candidate : null;
      const hovered = polygonAtLatticePoint(hoverPoint);
      hoveredPolygonId = hovered ? hovered.id : null;
      draw();
    }

    function handleClick(evt) {
      updateHover(evt);

      if (currentMode() === 'delete') {
        deleteClickedPolygon();
        return;
      }

      handleAddModeClick();
    }

    function handleAddModeClick() {
      if (!hoverPoint) {
        setMessage('Move closer to a dot before clicking.');
        return;
      }

      const clickedExistingPolygon = polygonAtLatticePoint(hoverPoint);
      if (clickedExistingPolygon && currentVertices.length === 0) {
        selectPolygon(clickedExistingPolygon.id);
        setMessage('Polygon selected. Its count is shown on the right.');
        return;
      }

      const used = allUsedPointSet();
      const clickedKey = pointKey(hoverPoint);

      if (used.has(clickedKey)) {
        setMessage('That dot is already used by another polygon. Choose a different dot.');
        return;
      }

      if (currentVertices.length >= 3 && samePoint(hoverPoint, currentVertices[0])) {
        closeCurrentPolygon();
        return;
      }

      if (currentVertices.some(v => samePoint(v, hoverPoint))) {
        setMessage('That point is already a vertex. Choose a new point, or click the starting point to close the polygon.');
        return;
      }

      selectedPolygonId = null;
      currentVertices.push({ ...hoverPoint });
      updateResults();
      updateClearButton();
      setMessage(currentVertices.length < 3
        ? 'Good. Add more vertices. You need at least 3 before you can close the polygon.'
        : 'Now you may add another vertex, or click the starting point to close the polygon.'
      );
      draw();
    }

    function closeCurrentPolygon() {
      if (!polygonIsSimple(currentVertices)) {
        eraseAttempt('That polygon is not legitimate because some sides cross. It has been erased.');
        return;
      }

      const boundaryPoints = getBoundaryPoints(currentVertices);
      const interiorPoints = getInteriorPoints(currentVertices, boundaryPoints);
      const newPointSet = makePointSet([...boundaryPoints, ...interiorPoints]);
      const used = allUsedPointSet();

      for (const key of newPointSet) {
        if (used.has(key)) {
          eraseAttempt('That polygon overlaps with a point already used by another polygon. It has been erased.');
          return;
        }
      }

      const poly = {
        id: nextPolygonId++,
        vertices: currentVertices.map(p => ({ ...p })),
        boundaryPoints,
        interiorPoints,
        allPointSet: newPointSet
      };

      polygons.push(poly);
      selectedPolygonId = null;
      currentVertices = [];
      updateResults();
      updateClearButton();
      setMessage('Polygon added. Click one of its red or blue dots to show its count.');
      draw();
    }

    function eraseAttempt(text) {
      currentVertices = [];
      hoverPoint = null;
      selectedPolygonId = null;
      updateResults();
      updateClearButton();
      setMessage(text);
      draw();
    }

    function deleteClickedPolygon() {
      if (!hoverPoint) {
        setMessage('Move close to a red or blue dot of the polygon you want to delete.');
        return;
      }
      const poly = polygonAtLatticePoint(hoverPoint);
      if (!poly) {
        setMessage('No polygon selected for deletion. Click one of its red or blue dots.');
        return;
      }
      polygons = polygons.filter(p => p.id !== poly.id);
      if (selectedPolygonId === poly.id) selectedPolygonId = null;
      if (hoveredPolygonId === poly.id) hoveredPolygonId = null;
      currentVertices = [];
      updateResults();
      updateClearButton();
      setMessage('Polygon deleted.');
      draw();
    }

    function selectPolygon(id) {
      selectedPolygonId = id;
      updateResults();
      draw();
    }

    function polygonArea(poly) {
      let sum = 0;
      for (let i = 0; i < poly.length; i++) {
        const a = poly[i];
        const b = poly[(i + 1) % poly.length];
        sum += a.x * b.y - a.y * b.x;
      }
      return Math.abs(sum) / 2;
    }

    function getBoundaryPoints(poly) {
      const map = new Map();
      for (let i = 0; i < poly.length; i++) {
        const a = poly[i];
        const b = poly[(i + 1) % poly.length];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const steps = gcd(dx, dy);
        const stepX = dx / steps;
        const stepY = dy / steps;
        for (let k = 0; k <= steps; k++) {
          const p = { x: a.x + k * stepX, y: a.y + k * stepY };
          map.set(pointKey(p), p);
        }
      }
      return [...map.values()];
    }

    function getInteriorPoints(poly, boundary) {
      const boundarySet = new Set(boundary.map(pointKey));
      const xs = poly.map(p => p.x);
      const ys = poly.map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const inside = [];

      for (let x = minX; x <= maxX; x++) {
        for (let y = minY; y <= maxY; y++) {
          const p = { x, y };
          if (boundarySet.has(pointKey(p))) continue;
          if (pointInPolygon(p, poly)) inside.push(p);
        }
      }
      return inside;
    }

    // Ray-casting test. Boundary points are excluded before this function is called.
    function pointInPolygon(point, poly) {
      let inside = false;
      const x = point.x, y = point.y;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i].x, yi = poly[i].y;
        const xj = poly[j].x, yj = poly[j].y;
        const intersect = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function polygonIsSimple(poly) {
      const n = poly.length;
      for (let i = 0; i < n; i++) {
        const a1 = poly[i];
        const a2 = poly[(i + 1) % n];
        for (let j = i + 1; j < n; j++) {
          const b1 = poly[j];
          const b2 = poly[(j + 1) % n];

          // Adjacent edges naturally share one endpoint; that is allowed.
          if (i === j) continue;
          if ((i + 1) % n === j) continue;
          if (i === (j + 1) % n) continue;

          if (segmentsIntersect(a1, a2, b1, b2)) return false;
        }
      }
      return polygonArea(poly) > 0;
    }

    function orientation(a, b, c) {
      const val = (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
      if (val === 0) return 0;
      return val > 0 ? 1 : -1;
    }

    function onSegment(a, b, c) {
      return Math.min(a.x, c.x) <= b.x && b.x <= Math.max(a.x, c.x) &&
             Math.min(a.y, c.y) <= b.y && b.y <= Math.max(a.y, c.y) &&
             orientation(a, b, c) === 0;
    }

    function segmentsIntersect(p1, q1, p2, q2) {
      const o1 = orientation(p1, q1, p2);
      const o2 = orientation(p1, q1, q2);
      const o3 = orientation(p2, q2, p1);
      const o4 = orientation(p2, q2, q1);

      if (o1 !== o2 && o3 !== o4) return true;
      if (o1 === 0 && onSegment(p1, p2, q1)) return true;
      if (o2 === 0 && onSegment(p1, q2, q1)) return true;
      if (o3 === 0 && onSegment(p2, p1, q2)) return true;
      if (o4 === 0 && onSegment(p2, q1, q2)) return true;
      return false;
    }

    function selectedPolygon() {
      return polygons.find(p => p.id === selectedPolygonId) || null;
    }

    function updateResults() {
      const poly = selectedPolygon();
      pValue.textContent = poly ? poly.boundaryPoints.length : '—';
      iValue.textContent = poly ? poly.interiorPoints.length : '—';
    }

    function updateClearButton() {
      clearBtn.disabled = polygons.length === 0 && currentVertices.length === 0;
    }

    function setMessage(text) {
      message.textContent = text;
    }

    function clearAll() {
      polygons = [];
      currentVertices = [];
      hoverPoint = null;
      hoveredPolygonId = null;
      selectedPolygonId = null;
      updateResults();
      updateClearButton();
      setMessage('Start by clicking any unused dot.');
      draw();
    }

    function drawGrid() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#f7f7f7';
      ctx.fillRect(0, 0, width, height);

      const minX = Math.floor((0 - origin.x) / gridSize) - 1;
      const maxX = Math.ceil((width - origin.x) / gridSize) + 1;
      const minY = Math.floor((origin.y - height) / gridSize) - 1;
      const maxY = Math.ceil(origin.y / gridSize) + 1;

      ctx.fillStyle = '#999';
      for (let x = minX; x <= maxX; x++) {
        for (let y = minY; y <= maxY; y++) {
          const s = latticeToScreen({ x, y });
          ctx.beginPath();
          ctx.arc(s.x, s.y, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawLine(a, b, color, widthPx, dashed = false) {
      const sa = latticeToScreen(a);
      const sb = latticeToScreen(b);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = widthPx;
      ctx.setLineDash(dashed ? [8, 6] : []);
      ctx.beginPath();
      ctx.moveTo(sa.x, sa.y);
      ctx.lineTo(sb.x, sb.y);
      ctx.stroke();
      ctx.restore();
    }

    function drawPolygon(poly, active) {
      const lineColor = active ? 'rgba(21, 101, 192, 1)' : 'rgba(21, 101, 192, 0.28)';
      const boundaryColor = active ? 'rgba(211, 47, 47, 1)' : 'rgba(211, 47, 47, 0.35)';
      const interiorColor = active ? 'rgba(21, 101, 192, 1)' : 'rgba(21, 101, 192, 0.25)';
      const lineWidth = active ? 4 : 3;
      const radius = active ? 6 : 5;

      for (let i = 0; i < poly.vertices.length; i++) {
        drawLine(poly.vertices[i], poly.vertices[(i + 1) % poly.vertices.length], lineColor, lineWidth);
      }

      drawHighlightedPoints(poly.interiorPoints, interiorColor, radius);
      drawHighlightedPoints(poly.boundaryPoints, boundaryColor, radius);
    }

    function drawCurrentLines() {
      if (currentVertices.length >= 2) {
        for (let i = 0; i < currentVertices.length - 1; i++) {
          drawLine(currentVertices[i], currentVertices[i + 1], '#1565c0', 4);
        }
      }

      if (hoverPoint && currentVertices.length >= 1 && currentMode() === 'add') {
        drawLine(currentVertices[currentVertices.length - 1], hoverPoint, '#777', 2, true);
      }
    }

    function drawHighlightedPoints(points, color, radius) {
      ctx.fillStyle = color;
      for (const p of points) {
        const s = latticeToScreen(p);
        ctx.beginPath();
        ctx.arc(s.x, s.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawCurrentVertices() {
      for (let i = 0; i < currentVertices.length; i++) {
        const s = latticeToScreen(currentVertices[i]);
        ctx.fillStyle = i === 0 ? '#ff9800' : '#111';
        ctx.beginPath();
        ctx.arc(s.x, s.y, 7, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawHover() {
      if (!hoverPoint) return;
      const s = latticeToScreen(hoverPoint);
      let color = '#333';
      let radius = 6;

      if (currentMode() === 'add') {
        const used = allUsedPointSet();
        if (currentVertices.length >= 3 && samePoint(hoverPoint, currentVertices[0])) {
          color = '#ff9800';
          radius = 11;
        } else if (currentVertices.some(v => samePoint(v, hoverPoint)) || used.has(pointKey(hoverPoint))) {
          color = '#c62828';
          radius = 8;
        }
      } else {
        color = hoveredPolygonId ? '#c62828' : '#333';
        radius = hoveredPolygonId ? 10 : 6;
      }

      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    function draw() {
      drawGrid();

      for (const poly of polygons) {
        const active = poly.id === selectedPolygonId || poly.id === hoveredPolygonId;
        drawPolygon(poly, active);
      }

      if (currentMode() === 'add') {
        drawCurrentLines();
        drawCurrentVertices();
      }

      drawHover();
    }

    canvas.addEventListener('mousemove', updateHover);
    canvas.addEventListener('mouseleave', () => {
      hoverPoint = null;
      hoveredPolygonId = null;
      draw();
    });
    canvas.addEventListener('click', handleClick);
    clearBtn.addEventListener('click', clearAll);
    for (const input of modeInputs) {
      input.addEventListener('change', () => {
        currentVertices = [];
        selectedPolygonId = null;
        updateResults();
        updateClearButton();
        setMessage(currentMode() === 'add'
          ? 'Add mode: click unused dots to draw a new polygon.'
          : 'Delete mode: click one red or blue dot of a polygon to delete it.'
        );
        draw();
      });
    }
    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();
    updateResults();
    updateClearButton();
    setMessage('Start by clicking any unused dot.');
  </script>
</body>
</html>
